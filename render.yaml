services:
  - type: web
    name: cinebook-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cinebook-db
          property: connectionString
      - key: EMAIL_BACKEND
        value: console
      - key: SEAT_HOLD_TTL_MINUTES
        value: "10"
      - key: WAITLIST_OFFER_TTL_MINUTES
        value: "15"
      - key: RELEASE_SCHEDULER_INTERVAL_SECONDS
        value: "15"
      - key: BASE_URL
        fromService:
          type: web
          name: cinebook-api
          property: host

databases:
  - name: cinebook-db
    plan: free
